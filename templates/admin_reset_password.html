<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Password Reset — FloodClaims Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#060C1A;--surface:#0D1526;--elevated:#121E35;--border:rgba(255,255,255,0.07);--teal:#06D6C7;--c-text:#E8F0FF;--c-muted:#7A8BAD;--red:#F87171;--green:#34D399;--grad:linear-gradient(135deg,#06D6C7 0%,#3B7BFF 100%)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--c-text);background-image:radial-gradient(ellipse 80% 60% at 0% 0%,rgba(6,214,199,.1) 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 100% 100%,rgba(59,123,255,.1) 0%,transparent 55%)}
.card{width:100%;max-width:440px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:2.5rem 2rem;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad)}
h1{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:800;text-align:center;margin-bottom:.5rem}
.sub{text-align:center;font-size:.8rem;color:var(--c-muted);margin-bottom:1.5rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--c-muted);margin-bottom:.4rem}
.form-control{width:100%;background:var(--elevated);border:1px solid var(--border);border-radius:10px;color:var(--c-text);font-size:.9rem;padding:.7rem .9rem;outline:none;transition:border-color .2s}
.form-control:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(6,214,199,.12)}
.btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;font-weight:700;padding:.8rem;border:none;border-radius:10px;cursor:pointer;font-size:.9rem;transition:all .2s;margin-top:.5rem}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 4px 16px rgba(6,214,199,.3)}
.btn-primary:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.alert{padding:.7rem 1rem;border-radius:8px;font-size:.8rem;margin-bottom:1rem;border:1px solid}
.alert-error{background:rgba(248,113,113,.08);color:#FCA5A5;border-color:rgba(248,113,113,.2)}
.alert-success{background:rgba(52,211,153,.08);color:#6EE7B7;border-color:rgba(52,211,153,.2)}
.alert-info{background:rgba(6,214,199,.08);color:var(--teal);border-color:rgba(6,214,199,.2)}
#result{display:none}
</style>
</head>
<body>
<div class="card">
  <h1>🔐 Admin Password Reset</h1>
  <p class="sub">Reset the admin password using the server environment key</p>

  <div id="result"></div>

  <form id="resetForm">
    <div class="form-group">
      <label>Current Admin Password (from env var)</label>
      <input class="form-control" type="password" id="currentPw" placeholder="Enter the ADMIN_PASSWORD value" required/>
      <div style="font-size:.65rem;color:var(--t-muted);margin-top:3px">This is the ADMIN_PASSWORD environment variable value</div>
    </div>
    <div class="form-group">
      <label>New Password</label>
      <input class="form-control" type="password" id="newPw" placeholder="Min 8 characters" required minlength="8"/>
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input class="form-control" type="password" id="confirmPw" placeholder="Re-enter new password" required minlength="8"/>
    </div>
    <button type="submit" class="btn btn-primary" id="submitBtn">Reset Password</button>
  </form>

  <div style="text-align:center;margin-top:1rem">
    <a href="/login" style="font-size:.78rem;color:var(--c-muted);text-decoration:none" onmouseover="this.style.color='var(--teal)'" onmouseout="this.style.color='var(--c-muted)'">← Back to Sign In</a>
  </div>
</div>

<script>
document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const result = document.getElementById('result');
  const btn = document.getElementById('submitBtn');
  const currentPw = document.getElementById('currentPw').value;
  const newPw = document.getElementById('newPw').value;
  const confirmPw = document.getElementById('confirmPw').value;

  if (newPw !== confirmPw) {
    result.className = 'alert alert-error';
    result.textContent = '❌ Passwords do not match.';
    result.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Resetting...';

  try {
    const resp = await fetch('/admin/reset-admin-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({current_admin_password: currentPw, new_password: newPw})
    });
    const data = await resp.json();
    if (resp.ok) {
      result.className = 'alert alert-success';
      result.innerHTML = '✅ Password reset successfully! <a href="/login" style="color:var(--teal);font-weight:700">Go to login →</a>';
    } else {
      result.className = 'alert alert-error';
      result.textContent = '❌ ' + (data.error || 'Reset failed. Check the admin password.');
    }
  } catch (err) {
    result.className = 'alert alert-error';
    result.textContent = '❌ Network error. Make sure the app is running.';
  }

  result.style.display = 'block';
  btn.disabled = false;
  btn.textContent = 'Reset Password';
});
</script>
</body>
</html>
