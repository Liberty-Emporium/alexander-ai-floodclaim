<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Set New Password — FloodClaims Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#060C1A;--surface:#0D1526;--elevated:#121E35;--border:rgba(255,255,255,0.07);--teal:#06D6C7;--c-text:#E8F0FF;--c-muted:#7A8BAD;--red:#F87171;--green:#34D399;--grad:linear-gradient(135deg,#06D6C7 0%,#3B7BFF 100%)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--c-text);background-image:radial-gradient(ellipse 80% 60% at 0% 0%,rgba(6,214,199,.1) 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 100% 100%,rgba(59,123,255,.1) 0%,transparent 55%)}
.card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:2.5rem 2rem;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad)}
h1{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:.5rem}
.sub{text-align:center;font-size:.85rem;color:var(--c-muted);margin-bottom:1.5rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--c-muted);margin-bottom:.4rem}
.form-control{width:100%;background:var(--elevated);border:1px solid var(--border);border-radius:10px;color:var(--c-text);font-size:.9rem;padding:.7rem .9rem;outline:none;transition:border-color .2s}
.form-control:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(6,214,199,.12)}
.btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;font-weight:700;padding:.8rem;border:none;border-radius:10px;cursor:pointer;font-size:.9rem;transition:all .2s}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 4px 16px rgba(6,214,199,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(6,214,199,.4)}
.alert{display:flex;align-items:center;gap:.6rem;padding:.7rem 1rem;border-radius:8px;font-size:.8rem;margin-bottom:1rem;border:1px solid}
.alert-error{background:rgba(248,113,113,.08);color:#FCA5A5;border-color:rgba(248,113,113,.2)}
.alert-success{background:rgba(52,211,153,.08);color:#6EE7B7;border-color:rgba(52,211,153,.2)}
.back{text-align:center;margin-top:1rem}
.back a{color:var(--c-muted);text-decoration:none;font-size:.8rem}
.back a:hover{color:var(--teal)}
</style>
</head>
<body>
<div class="card">
  <h1>🔐 Set New Password</h1>
  <p class="sub">Enter your new password below</p>

  {% for msg in get_flashed_messages(category_filter=['error']) %}
  <div class="alert alert-error">⚠️ {{ msg }}</div>
  {% endfor %}
  {% for msg in get_flashed_messages(category_filter=['success']) %}
  <div class="alert alert-success">✅ {{ msg }}</div>
  {% endfor %}

  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label>New Password</label>
      <input class="form-control" type="password" name="password" placeholder="Min 8 characters" required minlength="8" autofocus/>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input class="form-control" type="password" name="password_confirm" placeholder="Re-enter password" required minlength="8"/>
    </div>
    <button type="submit" class="btn btn-primary">Reset Password</button>
  </form>
  <div class="back"><a href="{{ url_for('auth.login') }}">← Back to Sign In</a></div>
</div>
</body>
</html>
